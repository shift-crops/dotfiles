---
# Rust toolchain via rustup
# Installation priority:
#   [1] apt    — rustup package (Ubuntu 22.04+)
#   [5] curl   — official rustup installer (fallback when apt fails)

- name: toolchains/rust | install rustup — apt with curl fallback
  block:
    - name: toolchains/rust | install rustup via apt
      become: true
      ansible.builtin.apt:
        name: rustup
        state: present
  rescue:
    - name: toolchains/rust | apt failed — install build-essential
      become: true
      ansible.builtin.apt:
        name: build-essential
        state: present

    - name: toolchains/rust | install rustup via curl installer
      ansible.builtin.shell: |
        set -o pipefail
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
          | sh -s -- -y 2>&1 | { tee /dev/tty 2>/dev/null || cat; }
      args:
        executable: /bin/bash
        creates: "{{ cargo_bin }}/rustup"

- name: toolchains/rust | set stable toolchain as default
  ansible.builtin.command: rustup default stable
  register: _rustup_default
  changed_when: "'unchanged' not in _rustup_default.stdout"
  environment:
    PATH: "{{ ansible_env.PATH }}:{{ cargo_bin }}"

- name: toolchains/rust | update Rust toolchain
  ansible.builtin.shell: |
    set -o pipefail
    rustup update 2>&1 | { tee /dev/tty 2>/dev/null || cat; }
  args:
    executable: /bin/bash
  register: _rustup_update
  changed_when: "'Updated' in _rustup_update.stdout"
  environment:
    PATH: "{{ ansible_env.PATH }}:{{ cargo_bin }}"
