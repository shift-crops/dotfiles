---
# Go toolchain — install method: [1] apt
# golang-go on Ubuntu 22.04 provides Go 1.18+, sufficient for building lazygit.

- name: toolchains/go | install golang-go and build-essential
  become: true
  ansible.builtin.apt:
    name:
      - golang-go
      - build-essential
    state: present

- name: toolchains/go | check configured GOPATH
  ansible.builtin.command: go env GOPATH
  register: _go_env_gopath
  changed_when: false

- name: toolchains/go | set GOPATH under XDG_DATA_HOME
  ansible.builtin.command:
    cmd: go env -w GOPATH={{ gopath }}
  when: _go_env_gopath.stdout != gopath
