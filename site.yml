---
- name: Dotfiles Setup
  hosts: all
  gather_facts: true

  pre_tasks:
    - name: Update apt cache
      become: true
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      tags: always

    - name: Ensure local bin directory exists
      ansible.builtin.file:
        path: "{{ local_bin }}"
        state: directory
        mode: "0755"
      tags: always

  tasks:
    # ── deps/ (installable standalone via -t <tag>) ──────────────────────────
    - name: deps | fonts
      ansible.builtin.include_role:
        name: fonts
        apply:
          tags: [fonts]
      tags: [never, fonts]

    - name: deps | fzf
      ansible.builtin.include_role:
        name: fzf
        apply:
          tags: [fzf]
      tags: [never, fzf]

    - name: deps | powerline
      ansible.builtin.include_role:
        name: powerline
        apply:
          tags: [powerline]
      tags: [never, powerline]

    - name: deps | tree-sitter
      ansible.builtin.include_role:
        name: tree-sitter
        apply:
          tags: [tree-sitter]
      tags: [never, tree-sitter]

  roles:
    # ── main components ──────────────────────────────────────────────────────
    # Dependency edges (handled via include_role in each role's tasks):
    #   git   → fonts
    #   nvim  → powerline, fonts, tree-sitter
    #   tmux  → powerline, fonts
    #   vim   → powerline
    #   yazi  → fonts
    #   zsh   → fzf, powerline
    - role: git
      tags: [git]
    - role: nvim
      tags: [nvim, neovim]
    - role: tmux
      tags: [tmux]
    - role: yazi
      tags: [yazi]
    - role: zsh
      tags: [zsh]
