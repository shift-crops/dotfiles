---
# ── dependencies ─────────────────────────────────────────────────────────────

- name: yazi | ensure Nerd Fonts (required by file icons)
  ansible.builtin.include_role:
    name: fonts
    apply:
      tags: [yazi, fonts]
  tags: [yazi]

# ── yazi ────────────────────────────────────────────────────────────────────
# Installation priority:
#   [4] GitHub .deb    — https://github.com/sxyazi/yazi/releases
#   [5] cargo install  — fallback when .deb install fails; --force yazi-build

- name: yazi | check installed version
  ansible.builtin.command: yazi --version
  register: _yazi_ver_raw
  changed_when: false
  failed_when: false
  environment:
    PATH: "{{ ansible_env.PATH }}:{{ cargo_bin }}"

- name: yazi | parse installed version
  ansible.builtin.set_fact:
    _yazi_ver: >-
      {{ (_yazi_ver_raw.stdout | regex_search('[Yy]azi ([0-9]+\.[0-9]+\.[0-9]+)', '\1') | first)
         if _yazi_ver_raw.rc == 0 else '0.0.0' }}

- name: yazi | install
  when: _yazi_ver is version(min_versions.yazi, '<')
  block:
    # ── step 1: fetch latest GitHub release ──────────────────────────────────
    - name: yazi | fetch latest release info
      ansible.builtin.uri:
        url: https://api.github.com/repos/sxyazi/yazi/releases/latest
        headers:
          Accept: application/vnd.github.v3+json
      register: _yazi_release

    # ── step 2: download .deb ─────────────────────────────────────────────────
    - name: yazi | download .deb
      ansible.builtin.get_url:
        url: >-
          https://github.com/sxyazi/yazi/releases/download/{{ _yazi_release.json.tag_name
          }}/yazi-x86_64-unknown-linux-gnu.deb
        dest: /tmp/yazi.deb
        mode: "0644"

    # ── step 3: install .deb — with cargo fallback ────────────────────────────
    - name: yazi | install .deb — with cargo fallback
      block:
        - name: yazi | install from .deb via apt
          become: true
          ansible.builtin.apt:
            deb: /tmp/yazi.deb
      rescue:
        - name: yazi | .deb install failed — ensure Rust toolchain
          ansible.builtin.include_role:
            name: toolchains
            tasks_from: rust

        - name: yazi | cargo install --force yazi-build
          ansible.builtin.shell: |
            set -o pipefail
            cargo install --force yazi-build 2>&1 | { tee /dev/tty 2>/dev/null || cat; }
          args:
            executable: /bin/bash
          environment:
            PATH: "{{ ansible_env.PATH }}:{{ cargo_bin }}"

    - name: yazi | remove downloaded .deb
      ansible.builtin.file:
        path: /tmp/yazi.deb
        state: absent

# ── yazi dependencies ────────────────────────────────────────────────────────

- name: yazi | install apt dependencies
  become: true
  ansible.builtin.apt:
    name:
      - zoxide
      - fd-find
    state: present

# ── yazi config ──────────────────────────────────────────────────────────────

- name: yazi | ensure config directory
  ansible.builtin.file:
    path: "{{ yazi_config_dir }}"
    state: directory
    mode: "0755"

- name: yazi | discover configs
  ansible.builtin.find:
    paths: "{{ dotfiles_dir }}/yazi/configs"
    file_type: any
    depth: 1
  register: _yazi_configs

- name: yazi | symlink all configs
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: "{{ yazi_config_dir }}/{{ item.path | basename }}"
    state: link
  loop: "{{ _yazi_configs.files }}"

# ── yazi plugins ─────────────────────────────────────────────────────────────

- name: yazi | check if ya CLI is usable
  ansible.builtin.command: ya --version
  register: _ya_check
  changed_when: false
  failed_when: false
  environment:
    PATH: "{{ ansible_env.PATH }}:{{ cargo_bin }}"

- name: yazi | install nightfly flavor
  ansible.builtin.command: ya pkg add tkapias/nightfly
  args:
    creates: "{{ yazi_config_dir }}/flavors/nightfly.yazi"
  when: _ya_check.rc == 0
  environment:
    PATH: "{{ ansible_env.PATH }}:{{ cargo_bin }}"

- name: yazi | install lazygit plugin
  ansible.builtin.command: ya pkg add Lil-Dank/lazygit
  args:
    creates: "{{ yazi_config_dir }}/plugins/lazygit.yazi"
  when: _ya_check.rc == 0
  environment:
    PATH: "{{ ansible_env.PATH }}:{{ cargo_bin }}"
