---
# ── dependencies ─────────────────────────────────────────────────────────────

- name: git | ensure Nerd Fonts (required by lazygit UI)
  ansible.builtin.include_role:
    name: fonts
    apply:
      tags: [git, fonts]
  tags: [git]

# ── git ─────────────────────────────────────────────────────────────────────
# Install method: [1] apt default (Ubuntu 22.04 ships 2.34.1 ≥ 2.34.0)

- name: git | install via apt
  become: true
  ansible.builtin.apt:
    name:
      - git
      - curl
    state: present

- name: git | ensure config directory
  ansible.builtin.file:
    path: "{{ git_config_dir }}"
    state: directory
    mode: "0755"

- name: git | discover top-level configs
  ansible.builtin.find:
    paths: "{{ dotfiles_dir }}/git/configs"
    file_type: file
    depth: 1
  register: _git_top_configs

- name: git | symlink top-level git configs
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: "{{ git_config_dir }}/{{ item.path | basename }}"
    state: link
  loop: "{{ _git_top_configs.files }}"

# ── delta ───────────────────────────────────────────────────────────────────
# Installation priority:
#   [1] Default apt    — package name is git-delta on Ubuntu
#   [4] GitHub .deb    — used when apt candidate is too old or absent

- name: delta | check installed version
  ansible.builtin.command: delta --version
  register: _delta_ver_raw
  changed_when: false
  failed_when: false

- name: delta | parse installed version
  ansible.builtin.set_fact:
    _delta_ver: >-
      {{ (_delta_ver_raw.stdout | regex_search('delta ([0-9]+\.[0-9]+\.[0-9]+)', '\1') | first)
         if _delta_ver_raw.rc == 0 else '0.0.0' }}

- name: delta | install
  when: _delta_ver is version(min_versions.delta, '<')
  block:
    # ── step 1: check default apt candidate ──────────────────────────────────
    - name: delta | check apt candidate version
      ansible.builtin.shell: |
        ver=$(apt-cache policy git-delta 2>/dev/null | awk '/Candidate:/{print $2}')
        { [ "$ver" = "(none)" ] || [ -z "$ver" ]; } && echo "0.0.0" || echo "$ver"
      register: _apt_delta_ver
      changed_when: false

    # ── step 2: use default apt if it satisfies the minimum ──────────────────
    - name: delta | install from apt
      become: true
      ansible.builtin.apt:
        name: git-delta
        state: present
      when: _apt_delta_ver.stdout is version(min_versions.delta, '>=')

    # ── step 3: download .deb from GitHub releases ────────────────────────────
    - name: delta | install from GitHub releases
      when: _apt_delta_ver.stdout is version(min_versions.delta, '<')
      block:
        - name: delta | fetch latest release info
          ansible.builtin.uri:
            url: https://api.github.com/repos/dandavison/delta/releases/latest
            headers:
              Accept: application/vnd.github.v3+json
          register: _delta_release

        - name: delta | download .deb
          ansible.builtin.get_url:
            url: >-
              https://github.com/dandavison/delta/releases/download/{{ _delta_release.json.tag_name
              }}/git-delta_{{ _delta_release.json.tag_name }}_amd64.deb
            dest: /tmp/git-delta.deb
            mode: "0644"

        # ── step 4: install .deb — with cargo fallback ────────────────────────
        - name: delta | install .deb — with cargo fallback
          block:
            - name: delta | install .deb via apt
              become: true
              ansible.builtin.apt:
                deb: /tmp/git-delta.deb
          rescue:
            - name: delta | .deb install failed — ensure Rust toolchain
              ansible.builtin.include_role:
                name: toolchains
                tasks_from: rust

            - name: delta | cargo install git-delta
              ansible.builtin.shell: |
                set -o pipefail
                cargo install git-delta 2>&1 | { tee /dev/tty 2>/dev/null || cat; }
              args:
                executable: /bin/bash
              environment:
                PATH: "{{ ansible_env.PATH }}:{{ cargo_bin }}"

        - name: delta | remove downloaded .deb
          ansible.builtin.file:
            path: /tmp/git-delta.deb
            state: absent

# ── lazygit ─────────────────────────────────────────────────────────────────
# Installation method: [5] go build only.
# A custom lazygit_pin.patch must be applied before building, so pre-built binaries
# (apt, GitHub releases) cannot be used here.

- name: lazygit | check installed version
  ansible.builtin.command: lazygit --version
  register: _lg_ver_raw
  changed_when: false
  failed_when: false

- name: lazygit | parse installed version
  ansible.builtin.set_fact:
    _lg_ver: >-
      {{ (_lg_ver_raw.stdout | regex_search('version=([0-9]+\.[0-9]+\.[0-9]+)', '\1') | first)
         if _lg_ver_raw.rc == 0 else '0.0.0' }}

- name: lazygit | build from source
  when: _lg_ver is version(min_versions.lazygit, '<')
  block:
    - name: lazygit | ensure Go toolchain
      ansible.builtin.include_role:
        name: toolchains
        tasks_from: go

    - name: lazygit | clone repository
      ansible.builtin.git:
        repo: https://github.com/jesseduffield/lazygit.git
        dest: "{{ lazygit_data_dir }}"
        depth: 1
        update: false

    - name: lazygit | apply lazygit_pin.patch
      ansible.builtin.command:
        cmd: git apply "{{ dotfiles_dir }}/git/lazygit_pin.patch"
        chdir: "{{ lazygit_data_dir }}"
      register: _lg_patch
      changed_when: _lg_patch.rc == 0
      failed_when: false   # patch may already be applied on re-run

    - name: lazygit | build binary
      ansible.builtin.shell: |
        set -o pipefail
        go build 2>&1 | { tee /dev/tty 2>/dev/null || cat; }
      args:
        chdir: "{{ lazygit_data_dir }}"
        executable: /bin/bash
        creates: "{{ lazygit_data_dir }}/lazygit"
      environment:
        HOME: "{{ ansible_env.HOME }}"

    - name: lazygit | symlink binary to local bin
      ansible.builtin.file:
        src: "{{ lazygit_data_dir }}/lazygit"
        dest: "{{ local_bin }}/lazygit"
        state: link

- name: lazygit | ensure config directory
  ansible.builtin.file:
    path: "{{ lazygit_config_dir }}"
    state: directory
    mode: "0755"

- name: lazygit | discover configs
  ansible.builtin.find:
    paths: "{{ dotfiles_dir }}/git/configs/lazygit"
    file_type: file
    depth: 1
  register: _lazygit_configs

- name: lazygit | symlink configs
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: "{{ lazygit_config_dir }}/{{ item.path | basename }}"
    state: link
  loop: "{{ _lazygit_configs.files }}"
